<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" fill="#2563EB" rx="108"/>

  <!-- Stylized Truck Icon -->
  <g fill="white">
    <!-- Truck body -->
    <rect x="90" y="190" width="200" height="130" rx="16"/>

    <!-- Truck cabin -->
    <path d="M290 190 L290 320 L390 320 L390 250 L340 190 Z"/>

    <!-- Cabin window cutout -->
    <rect x="300" y="200" width="70" height="50" rx="8" fill="#2563EB" opacity="0.4"/>
  </g>

  <!-- Wheels -->
  <circle cx="160" cy="340" r="36" fill="white"/>
  <circle cx="160" cy="340" r="20" fill="#2563EB"/>
  <circle cx="330" cy="340" r="36" fill="white"/>
  <circle cx="330" cy="340" r="20" fill="#2563EB"/>

  <!-- Connection dots (واصل = connect) -->
  <circle cx="130" cy="130" r="20" fill="#93C5FD"/>
  <circle cx="256" cy="130" r="20" fill="white"/>
  <circle cx="382" cy="130" r="20" fill="#93C5FD"/>

  <!-- Connection lines -->
  <line x1="150" y1="130" x2="236" y2="130" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="276" y1="130" x2="362" y2="130" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
